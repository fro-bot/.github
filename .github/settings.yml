---
_extends: .github:common-settings.yaml

repository:
  name: .github
  description: GitHub defaults and community health files for @fro-bot.
  topics: fro-bot, actions, github-actions, renovate-config

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - Analyze (typescript)
          - Check Format
          - Check Types
          - Check Workflows
          - CodeQL
          - Fro Bot
          - Lint
          - Renovate / Renovate
          - Review Dependencies
          - Test
