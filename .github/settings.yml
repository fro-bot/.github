---
_extends: .github:common-settings.yaml

repository:
  name: .github
  description: GitHub defaults and community health files for @fro-bot.
  topics: fro-bot, actions, github-actions, renovate-config

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - Analyze (typescript)
          - Check Types
          - Check Wiki Authority
          - Check Workflows
          - CodeQL
          - Fro Bot
          - Lint
          - Renovate / Renovate
          - Review Dependencies
          - 'Security: Private Leak Scan'
          - Test
          - Test Scripts Load

labels:
  - name: wiki-lint
    color: '#5319e7'
    description: Applied to every wiki-lint issue
  - name: wiki-lint-finding
    color: '#fbca04'
    description: Deterministic wiki lint finding
  - name: wiki-lint-failure
    color: '#b60205'
    description: Wiki lint execution failure
  - name: reconcile:integrity-alert
    color: '#e11d48'
    description: Integrity alert requiring manual operator review
  - name: reconcile:visibility-transition
    color: '#f97316'
    description: Tracked repo transitioned from public to private
  - name: learning-proposal
    color: '#0e8a16'
    description: Candidate learning proposed from a multi-round-review PR
  - name: cross-repo-goal
    color: '#1d76db'
    description: Coordination issue describing a goal spanning multiple repos
  - name: dispatch-approved
    color: '#0e8a16'
    description: Operator-applied approval that dispatches the proposed items
