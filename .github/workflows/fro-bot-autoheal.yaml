---
name: Fro Bot Autoheal

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: Optional custom prompt (leave empty for default autoheal)
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: fro-bot-autoheal
  cancel-in-progress: false

env:
  AUTOHEAL_PROMPT: |
    Perform repository autohealing for fro-bot/.github. Work through each category
    in order and prioritize minimal, reversible changes.

    1. ERRORED PRs
      Find open PRs with failing CI checks. For each failing PR:
      - Check out the PR branch.
      - Read failing check logs and identify the root cause.
      - Apply a focused fix and push to that PR branch.
      - Post a concise PR comment: root cause, fix applied, remaining risk.

    2. SECURITY
      Review security updates and advisories for direct dependencies and Actions:
      - If an existing security PR is failing or conflicted, fix and push to that PR.
      - For unaddressed critical/high advisories, open a dedicated remediation PR.
      - Do NOT bundle unrelated upgrades into a security PR.

    3. HEALTH & MAINTENANCE
      - Identify outdated major versions in package.json and GitHub Action usages.
      - For workflow files, pin unpinned actions to full commit SHA when possible.
      - Create one PR per major dependency migration.

    4. DEVELOPER EXPERIENCE
      - Run project validation commands used by this repository.
      - Apply safe mechanical fixes (formatting/lint autofixes) on PR branches.
      - Prefer opening PRs over direct default-branch writes.

    Hard boundaries:
    - Never force-push, rewrite history, or delete branches.
    - Never modify secrets, org settings, environments, or branch protection.
    - Never change release workflows unless required to fix a failing run and
      the change is scoped and explained.
    - Do not create multiple summary issues.

    OUTPUT FORMAT — SINGLE SUMMARY ISSUE
    Create or update exactly one issue titled
    "Daily Autohealing Report — YYYY-MM-DD (UTC)" in this repository.

    The issue body MUST use this structure:
    ## Daily Autohealing Report — YYYY-MM-DD (UTC)
    ### Errored PRs
    ### Security
    ### Health & Maintenance
    ### Developer Experience
    ### Needs Human Attention

    Requirements:
    - Use links only for PRs/issues/commits.
    - If a section has no items, write "None".
    - Keep entries concise and actionable.

jobs:
  resolve-prompt:
    name: Resolve Autoheal Prompt
    runs-on: ubuntu-latest
    outputs:
      prompt: ${{ steps.resolve.outputs.prompt }}
    steps:
      - id: resolve
        env:
          INPUT_PROMPT: ${{ github.event.inputs.prompt || '' }}
          DEFAULT_PROMPT: ${{ env.AUTOHEAL_PROMPT }}
        run: |
          delimiter="EOF_$(openssl rand -hex 8)"
          if [ -n "$INPUT_PROMPT" ]; then
            {
              echo "prompt<<$delimiter"
              echo "$INPUT_PROMPT"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prompt<<$delimiter"
              echo "$DEFAULT_PROMPT"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
          fi

  fro-bot-autoheal:
    name: Fro Bot Autoheal
    needs: resolve-prompt
    uses: ./.github/workflows/fro-bot.yaml
    secrets: inherit
    with:
      prompt: ${{ needs.resolve-prompt.outputs.prompt }}
