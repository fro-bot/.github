---
# Renovate this repository when dispatched by dispatch-renovate.yaml, on PR/push events
# for the required status check, or on manual trigger.
name: Renovate

on:
  issues:
    types: [edited]
  pull_request:
    # `opened`, `reopened`, and `synchronize` ensure the `Renovate / Renovate` required
    # status check appears on PRs that fro-bot opens against `main` (e.g., wiki ingest
    # PRs from survey workflows). Without these, the workflow never fires on PR
    # creation and the required check never posts, leaving the PR blocked until
    # someone manually edits the PR to generate an `edited` event. `edited` is kept
    # for manual re-trigger workflows (PR body/comment edits).
    types: [opened, reopened, synchronize, edited]
  push:
    branches-ignore: [main]
  workflow_dispatch:
    inputs:
      log-level:
        description: Log level for Renovate
        required: false
        type: string
        default: debug
      print-config:
        description: Log the fully-resolved Renovate config for each repository, plus fully-resolved presets.
        required: false
        type: boolean
        default: false
  workflow_run:
    branches: [main]
    types: [completed]
    workflows: [Main]

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    if: >-
      (github.event.action == 'edited' && !contains(github.actor, '[bot]')) ||
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      )
    secrets:
      APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
      APPLICATION_PRIVATE_KEY: ${{ secrets.APPLICATION_PRIVATE_KEY }}
    uses: bfra-me/.github/.github/workflows/renovate.yaml@65caa6a021ae4a6597bd915f276e1ab9d75dc071 # v4.16.0
    with:
      # Disable autodiscover — cross-repo dispatch is handled by dispatch-renovate.yaml.
      # This workflow should only run Renovate for this repository.
      global-config: '{"autodiscover": false}'
      log-level: ${{ inputs.log-level || 'debug' }}
      path-filters: >-
        [
          '.github/workflows/renovate.yaml',
          '.github/renovate.json5',
          'default.json',
        ]
      print-config: ${{ inputs.print-config || false }}
