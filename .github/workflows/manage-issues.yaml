---
name: Manage Issues

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: lock

permissions:
  contents: read

jobs:
  close-automated-reports:
    name: Close Automated Reports
    runs-on: ubuntu-latest
    steps:
      - id: get-workflow-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Close old automated report issues
        env:
          GH_TOKEN: ${{ steps.get-workflow-app-token.outputs.token }}
        run: |
          # Close automated daily report issues older than 3 days.
          # These are superseded by newer reports and accumulate without bound.
          cutoff=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)
          closed=0
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 200 \
            --json number,title,createdAt \
            --jq ".[] | select(.title | test(\"Daily (Org Oversight|Autohealing) Report\")) | select(.createdAt < \"$cutoff\") | .number" | \
          while read -r number; do
            [ -z "$number" ] && continue
            gh issue close "$number" --repo "$GITHUB_REPOSITORY" --reason "not planned" \
              --comment "Auto-closed: daily report retention policy (3 days). Superseded by newer reports." || true
            closed=$((closed + 1))
            sleep 1
          done
          echo "Closed $closed automated report issues older than 3 days."
        shell: bash

  stale:
    name: Stale
    needs: close-automated-reports
    runs-on: ubuntu-latest
    steps:
      - id: get-workflow-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - id: stale
        name: Mark stale issues and pull requests
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          close-issue-label: closed-issue-activity
          close-pr-label: closed-pr-activity
          days-before-close: 60
          days-before-stale: 30
          exempt-issue-labels: awaiting-approval,work-in-progress
          exempt-pr-labels: awaiting-approval,work-in-progress
          repo-token: ${{ steps.get-workflow-app-token.outputs.token }}
          stale-issue-label: no-issue-activity
          stale-issue-message: This issue is stale because it has been open for 30 days with no activity. Remove this label to keep it open.
          stale-pr-label: no-pr-activity
          stale-pr-message: This pull request is stale because it has been open for 30 days with no activity. Remove this label to keep it open.
          operations-per-run: 50

      - name: Output summary
        env:
          closed: ${{ steps.stale.outputs.closed-issues-prs }}
          staled: ${{ steps.stale.outputs.staled-issues-prs }}
        run: |
          # Output summary of previous step
          {
            echo 'Closed issues and PRs:'
            echo "$closed"
            echo 'Staled issues and PRs:'
            echo "$staled"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      # - name: Sleep (for rate-limiting)
      #   run: sleep 380

  lock:
    continue-on-error: true
    name: Lock
    needs: stale
    runs-on: ubuntu-latest
    steps:
      - id: get-workflow-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - id: lock-threads
        name: Lock stale issues and pull requests
        uses: dessant/lock-threads@7266a7ce5c1df01b1c6db85bf8cd86c737dadbe7 # v6.0.0
        with:
          exclude-any-issue-labels: awaiting-approval,work-in-progress
          exclude-any-pr-labels: awaiting-approval,work-in-progress
          include-any-issue-labels: no-issue-activity
          include-any-pr-labels: no-pr-activity
          issue-comment: This issue is locked because of inactivity.
          issue-inactive-days: '30'
          github-token: ${{ steps.get-workflow-app-token.outputs.token }}
          pr-comment: This pull request is locked because of inactivity.
          pr-inactive-days: '30'

      - env:
          issues: ${{ steps.lock-threads.outputs.issues }}
          prs: ${{ steps.lock-threads.outputs.prs }}
        name: Output summary
        run: |
          # Output summary of previous step
          {
            echo 'Locked stale issues:'
            echo "$issues"
            echo 'Locked stale pull requests:'
            echo "$prs"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
