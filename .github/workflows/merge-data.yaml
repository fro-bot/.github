---
name: Merge Data Branch

on:
  schedule:
    - cron: '0 22 * * 0' # Every Sunday at 22:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-data:
    name: Merge data into main
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - id: get-workflow-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: ⤵ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup
        uses: ./.github/actions/setup

      # Two checkouts: scripts live on main, the wiki/metadata being promoted live on data.
      # The privacy check below runs from the data subtree to gate the actual merge content.
      - name: ⤵ Fetch data branch for privacy check
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: data
          path: data-branch-check

      # Use main's metadata/repos.yaml as the authoritative private-repo list so
      # stale orphan entries on the data branch cannot block the privacy gate.
      - name: 🔒 Block private wiki pages
        env:
          GITHUB_TOKEN: ${{ steps.get-workflow-app-token.outputs.token }}
        working-directory: data-branch-check
        run: |
          cp ../metadata/repos.yaml metadata/repos.yaml
          node ../scripts/check-wiki-private-presence.ts

      - name: 🔀 Open weekly data merge PR
        env:
          GITHUB_TOKEN: ${{ steps.get-workflow-app-token.outputs.token }}
        run: node scripts/merge-data-pr.ts
