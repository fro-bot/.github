---
name: Fro Bot

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request:
    types: [synchronize, ready_for_review, reopened, review_requested]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom prompt for the Fro Bot agent
        required: true
  workflow_call:
    inputs:
      prompt:
        description: Prompt passed by reusable caller workflow
        required: true
        type: string
    secrets:
      FRO_BOT_PAT:
        description: GitHub PAT for Fro Bot write-tier actions
        required: true
      OPENCODE_AUTH_JSON:
        description: OpenCode authentication configuration
        required: true
      OMO_PROVIDERS:
        description: OhMyOpenCode provider configuration
        required: true
      OPENCODE_CONFIG:
        description: OpenCode runtime configuration
        required: true

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  PR_REVIEW_PROMPT: |
    You are a skeptical reviewer for fro-bot/.github (org control center).
    Focus on correctness, security, and automation safety. Prefer false positives
    over false negatives for security issues.

    Scope:
    - Workflow/CI changes: pin actions to full commit SHA where possible; avoid
      pull_request_target unless explicitly justified; prevent workflow injection
      (untrusted input in run: blocks or shell eval); minimal permissions; no
      secrets in logs.
    - Repo rules: no `any`; no `@ts-ignore`/`@ts-expect-error`; avoid ES6 classes;
      explicit function return types; use `consola` instead of `console`.
    - Dependencies: identify direct additions/updates; flag known advisories;
      avoid unnecessary or duplicate deps; ensure license compatibility.
    - Tests: verify new/changed behavior has tests covering happy path, errors,
      and boundaries. If tests aren't needed, explain why.

    Hard boundaries:
    - Review only. Do NOT push commits, modify files, create branches, or open PRs.
    - Do NOT use labels, assignments, or milestone changes.
    - Use inline comments for file-specific findings. Use review body for summary only.
    - Do NOT speculate. If uncertain, state what evidence is missing.

    Do NOT comment on formatting, lint, or style nits handled by CI.

    Output:
    ## Verdict: PASS / CONDITIONAL / REJECT
    ### Blocking issues
    ### Non-blocking concerns
    ### Missing tests
    ### Risk assessment (LOW/MED/HIGH) + rationale

    Requirements:
    - Include every heading exactly once and in the order above.
    - Write "None" under headings with no findings.
    - Keep findings actionable: file path, impact, and concrete remediation.

  SCHEDULE_PROMPT: |
    Create a single issue titled "Daily Org Oversight Report — YYYY-MM-DD (UTC)"
    in this repository.

    Scope: all repositories in the fro-bot GitHub organization.

    Do NOT comment on or modify individual issues/PRs. Do NOT apply labels.
    Do NOT open PRs. This run must produce ONE summary issue only.

    Summarize with links only (no full content duplication). Keep it concise
    and actionable.

    Include sections:
    - Summary metrics (new issues, open PRs, stale issues/PRs, failing main
      checks, security alerts)
    - Critical items (security alerts, main branch failing, broken release
      pipelines) with repo, link, and recommended action
    - Aging PRs (no activity >7 days; stale >14 days)
    - Stale issues (no activity >30 days; recommend next step)
    - Unassigned bugs or high-signal issues (label bug, no assignee)
    - Repo hotspots (top 3 repos by open PRs or stale items)
    - Recommended actions (bulleted checklist)

    If any data source is unavailable, note "data unavailable" in that section.

jobs:
  fro-bot:
    name: Fro Bot
    runs-on: ubuntu-latest
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) && (
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        (
          github.event_name == 'pull_request' &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        inputs.prompt != '' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: Sync wiki from data branch
        run: |
          if git ls-remote --exit-code origin data >/dev/null 2>&1; then
            git fetch origin data
            git restore --source FETCH_HEAD --worktree -- knowledge
          fi

      - name: Capture wiki baseline
        id: wiki-baseline
        run: |
          git diff --no-ext-diff -- knowledge/index.md knowledge/log.md knowledge/wiki > "$RUNNER_TEMP/wiki-baseline.diff"
          echo "hash=$(shasum -a 256 "$RUNNER_TEMP/wiki-baseline.diff" | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: 🎭 Load Persona
        id: persona
        run: |
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "content<<$delimiter"
            cat persona/fro-bot-persona.md
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Query wiki context
        id: wiki-query
        env:
          WIKI_QUERY_EVENT_NAME: ${{ github.event_name }}
          WIKI_QUERY_OWNER: ${{ github.repository_owner }}
          WIKI_QUERY_REPO: ${{ github.event.repository.name }}
          WIKI_QUERY_TITLE: >-
            ${{
              github.event.pull_request.title ||
              github.event.issue.title ||
              github.event.discussion.title ||
              ''
            }}
          WIKI_QUERY_BODY: >-
            ${{
              github.event.pull_request.body ||
              github.event.issue.body ||
              github.event.comment.body ||
              ''
            }}
        run: node scripts/wiki-query.ts

      - name: Run Fro Bot
        id: fro-bot-agent
        uses: fro-bot/agent@4247f5e4d1fbd1857617ebe00040f1f95be0071f # v0.40.0
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PERSONA: ${{ steps.persona.outputs.content }}
          WIKI_CONTEXT: ${{ steps.wiki-query.outputs.excerpt }}
          TASK_PROMPT: >-
            ${{
              (github.event_name == 'workflow_dispatch' && (github.event.inputs.prompt || ''))
              || inputs.prompt
              || (github.event_name == 'schedule' && env.SCHEDULE_PROMPT)
              || (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          github-token: ${{ secrets.FRO_BOT_PAT }}
          auth-json: ${{ secrets.OPENCODE_AUTH_JSON }}
          model: ${{ vars.FRO_BOT_MODEL }}
          omo-providers: ${{ secrets.OMO_PROVIDERS }}
          opencode-config: ${{ secrets.OPENCODE_CONFIG }}
          prompt: |
            <persona>
            ${{ env.PERSONA }}
            </persona>

            ${{ env.TASK_PROMPT }}

            <wiki_context>
            ${{ env.WIKI_CONTEXT }}
            </wiki_context>

            <knowledge_persistence>
            Use the wiki context when it materially improves the response.
            If this interaction surfaces durable knowledge worth keeping, update only
            `knowledge/wiki/**`, `knowledge/index.md`, and `knowledge/log.md` following
            `knowledge/schema.md`. Keep changes additive, preserve contradictions with
            dates and sources, and leave the wiki untouched when the signal is weak.
            </knowledge_persistence>

      - name: Detect wiki insight changes
        id: wiki-changes
        if: always() && !cancelled()
        run: |
          git diff --no-ext-diff -- knowledge/index.md knowledge/log.md knowledge/wiki > "$RUNNER_TEMP/wiki-current.diff"
          current_hash=$(shasum -a 256 "$RUNNER_TEMP/wiki-current.diff" | cut -d ' ' -f1)
          if [ "$current_hash" = "${{ steps.wiki-baseline.outputs.hash }}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture ingest timestamp
        if: >-
          success() &&
          steps.wiki-changes.outputs.changed == 'true' &&
          contains(fromJSON('["issue_comment","pull_request_review_comment","discussion_comment","issues","pull_request","schedule"]'), github.event_name)
        id: ingest-ts
        run: echo "now=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Ingest wiki insight changes
        if: >-
          success() &&
          steps.wiki-changes.outputs.changed == 'true' &&
          contains(fromJSON('["issue_comment","pull_request_review_comment","discussion_comment","issues","pull_request","schedule"]'), github.event_name)
        env:
          GITHUB_TOKEN: ${{ secrets.FRO_BOT_PAT }}
          WIKI_OPERATION: event
          WIKI_TARGET: 'repo:${{ github.repository }}'
          WIKI_SUMMARY: Persisted durable knowledge from the ${{ github.event_name }} interaction on ${{ github.repository }}.
          WIKI_COMMIT_MESSAGE: 'feat(knowledge): ingest ${{ github.event_name }} context for ${{ github.repository }}'
          WIKI_SOURCES: '[{"url":"https://github.com/${{ github.repository }}","sha":"${{ github.sha }}","accessed":"${{ steps.ingest-ts.outputs.now }}"}]'
        run: node scripts/wiki-ingest.ts
