---
name: Unpublish Wiki (emergency takedown)

# Manual dispatch only — this is an incident-response action, never triggered
# by content pushes.
on:
  workflow_dispatch:

permissions: {}

# Shares publish-wiki's concurrency group so a takedown supersedes (cancels)
# any in-flight normal publish rather than racing it.
concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Takedown job: atomically replaces the live site with a tiny static
  # "unavailable" page via a full Pages artifact swap. Uses a SEPARATE
  # `pages-emergency` environment (no required reviewers) so an incident
  # response isn't gated behind an approval step.
  # ---------------------------------------------------------------------------
  takedown:
    name: Deploy takedown site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: pages-emergency
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: 📤 Upload takedown artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: takedown

      - name: 🚀 Deploy takedown site
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
