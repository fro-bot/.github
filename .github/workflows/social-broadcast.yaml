---
name: Social Broadcast

on:
  workflow_call:
    inputs:
      event_type:
        description: Event type for the broadcast (e.g. repo_survey_complete) — used for concurrency shaping
        required: true
        type: string
      discord_message:
        description: Discord embed description text
        required: false
        type: string
        default: ''
      discord_title:
        description: Discord embed title
        required: false
        type: string
        default: ''
      bluesky_text:
        description: BlueSky post text (≤ 300 graphemes; truncated if longer). Currently a no-op — Bluesky step is gated off pending re-evaluation; kept for forward compatibility.
        required: false
        type: string
        default: ''
      private:
        description: Whether the broadcast concerns a private repo (skips external Discord post when true)
        required: false
        type: boolean
        default: true
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false
      BLUESKY_HANDLE:
        required: false
      BLUESKY_APP_PASSWORD:
        required: false

permissions:
  contents: read

jobs:
  broadcast:
    name: Broadcast ${{ inputs.event_type }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup
        uses: ./.github/actions/setup

      - name: 📣 Notify Discord
        if: inputs.discord_message != '' && inputs.private != true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE: ${{ inputs.discord_message }}
          DISCORD_TITLE: ${{ inputs.discord_title }}
        run: |
          node scripts/discord-notify.ts \
            --message "$DISCORD_MESSAGE" \
            --title "$DISCORD_TITLE"

      # Bluesky posting is disabled pending re-evaluation of social channels.
      # The script (scripts/bluesky-post.ts) is intentionally retained for future
      # reactivation; only the step invocation here is gated off via `if: false`.
      - name: 🦋 Post to Bluesky
        if: false && inputs.bluesky_text != '' && inputs.private != true
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          BLUESKY_TEXT: ${{ inputs.bluesky_text }}
        run: node scripts/bluesky-post.ts "$BLUESKY_TEXT"
