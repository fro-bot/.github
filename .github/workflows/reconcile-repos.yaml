---
name: Reconcile Repos

on:
  schedule:
    - cron: '17 5 * * *' # Daily at 05:17 UTC (off-peak vs hourly Poll Invitations and Sunday 22:00 Merge Data)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: reconcile-repos
  cancel-in-progress: false

jobs:
  reconcile-repos:
    name: Reconcile metadata/repos.yaml with GitHub collaborator access
    runs-on: ubuntu-latest
    # Stagger + cap keep fan-out inside this budget even at the maximum configured
    # dispatch count: 12 dispatches × 90s stagger = ~16.5 minutes, plus ≤1 minute of
    # pre-dispatch work (access list, probes, commit). 25 minutes provides headroom
    # for GitHub API jitter without permitting a truly-stuck run.
    timeout-minutes: 25
    steps:
      - id: get-workflow-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          # Scope the token to the whole installation, not just this repo, so cross-org
          # contrib probes (`scripts/reconcile-repos.ts`) and any future App calls outside
          # this repo can succeed. Mirrors update-metadata.yaml and dispatch-renovate.yaml.
          owner: ${{ github.repository_owner }}

      - name: ⤵ Checkout Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup
        uses: ./.github/actions/setup

      # Survey writebacks (`recordSurveyResult`) and onboarding writes land on the `data`
      # branch, but the workflow's checkout pulls scripts from the default branch (`main`).
      # Overlay the authoritative `metadata/` tree from `data` so reconcile plans against
      # live state instead of whatever `main` last reflected.
      - name: ⤵ Overlay metadata from data branch
        env:
          GH_TOKEN: ${{ steps.get-workflow-app-token.outputs.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin data
          git checkout origin/data -- metadata/

      - name: 🔁 Reconcile repos
        env:
          FRO_BOT_POLL_PAT: ${{ secrets.FRO_BOT_POLL_PAT }}
          GITHUB_TOKEN: ${{ steps.get-workflow-app-token.outputs.token }}
          # Stagger between Survey Repo dispatches. Each survey run holds upstream LLM
          # capacity for ~5 minutes; 90 seconds between starts keeps the single seat from
          # saturating under fan-out (see marcusrbrown/infra#144).
          RECONCILE_DISPATCH_STAGGER_MS: '90000'
          # Cap dispatches per reconcile run. Candidates beyond the cap are eligible again
          # on the next run via the staleness gate, producing a progressive day-over-day
          # cadence instead of bursty fan-outs that exhaust upstream capacity.
          RECONCILE_MAX_DISPATCHES_PER_RUN: '12'
        run: node scripts/reconcile-repos.ts | tee "$RUNNER_TEMP/reconcile-result.json"
        shell: bash

      - if: always()
        name: 📋 Write step summary
        run: |
          # Write step summary from reconcile-repos output JSON
          result="$RUNNER_TEMP/reconcile-result.json"
          if [[ ! -s "$result" ]]; then
            echo "reconcile produced no result JSON" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Most fields read from the top level of HandleReconcileResult; the
          # "detected" count lives under .summary.visibilityTransitions (nested).
          {
            echo "## Reconcile Repos Summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Dispatched | $(jq '.dispatches // 0' "$result") |"
            echo "| Dispatches deferred | $(jq '.dispatchesDeferred // 0' "$result") |"
            echo "| Dispatches failed | $(jq '.dispatchesFailed // 0' "$result") |"
            echo "| Visibility transition issues | $(jq '.visibilityTransitionIssues // 0' "$result") |"
            echo "| Visibility transitions detected | $(jq '.summary.visibilityTransitions // 0' "$result") |"
            echo "| Visibility transition duplicates skipped | $(jq '.visibilityTransitionDuplicatesSkipped // 0' "$result") |"
            echo "| Per-repo issues | $(jq '.perRepoIssues // 0' "$result") |"
            echo "| Rollup issues | $(jq '.rollupIssues // 0' "$result") |"
            echo "| Issues failed | $(jq '.issuesFailed // 0' "$result") |"
            echo "| Closed stale issues | $(jq '.closedStaleIssues // 0' "$result") |"
            echo "| Probes failed | $(jq '.probesFailed // 0' "$result") |"
            echo "| Committed | $(jq '.committed // false' "$result") |"
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash
