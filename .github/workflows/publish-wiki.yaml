---
name: Publish Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge/wiki/**'
      - knowledge/index.md
      - knowledge/schema.md
      - 'quartz-site/**'
  workflow_dispatch:

# Least-privilege default: no token capabilities at the workflow level.
# Each job grants only what it needs.
permissions: {}

# Serialize publishes; never cancel an in-progress deploy mid-flight. Shared
# with unpublish-wiki.yaml's group name so a takedown can supersede a normal
# publish (see unpublish-wiki.yaml's cancel-in-progress: true).
concurrency:
  group: publish-wiki
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Build job: read-only checkout + pinned-SHA Quartz build. No pages/id-token
  # credentials — this job cannot deploy anything, only produce an artifact.
  # ---------------------------------------------------------------------------
  build:
    name: Build wiki site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: ⤵ Checkout Branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          # Brand assets (icon.png) are tracked via Git LFS per .gitattributes.
          # Without this the checkout yields 132-byte LFS pointer files and the
          # Quartz Favicon (sharp) emitter fails on "unsupported image format".
          lfs: true

      # Quartz is not a dependency in package.json — it's built from a
      # pinned upstream commit SHA into a scratch directory, then overlaid
      # with this repo's theme/config. This avoids trusting a floating
      # `npx quartz` invocation that could resolve to an unpinned version.
      - name: 📥 Clone Quartz at pinned SHA
        run: |
          git clone --no-checkout https://github.com/jackyzha0/quartz quartz-build
          cd quartz-build
          git fetch --depth 1 origin 9cf87ff1c248a8ca551093214b0fec3b31415009
          git checkout 9cf87ff1c248a8ca551093214b0fec3b31415009
        shell: bash -Eeuo pipefail {0}

      # Overlay this repo's theme/config onto the pinned Quartz checkout.
      # Quartz's own build config/components are replaced with ours; no
      # upstream file outside these paths is touched.
      - name: 🎨 Overlay quartz-site theme
        run: |
          cp quartz-site/quartz.config.yaml quartz-build/quartz.config.yaml
          # The local component plugin — the config references it as
          # `./local-plugin` relative to the Quartz build root.
          cp -r quartz-site/local-plugin quartz-build/local-plugin
          cp quartz-site/styles/custom.scss quartz-build/quartz/styles/custom.scss
          cp -r quartz-site/static/. quartz-build/quartz/static/
          # The committed, pinned plugin lockfile — the three-way gate below
          # proves the build actually honors it.
          cp quartz-site/quartz.lock.json quartz-build/quartz.lock.json
        shell: bash -Eeuo pipefail {0}

      - name: 📦 Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22

      # Quartz's own dependencies must be installed before the lockfile
      # gates and plugin install below — the CLI and the gate scripts
      # resolve js-yaml/yargs from quartz-build/node_modules.
      - name: 📦 Install Quartz dependencies
        working-directory: quartz-build
        run: npm ci
        shell: bash -Eeuo pipefail {0}

      # The local component plugin ships no build step and is only
      # symlinked (not built) by Quartz's loader, so it needs its own
      # `preact` in node_modules pinned to the same version Quartz itself
      # depends on (spike-proven: quartz-build/package.json is the source
      # of truth for the version).
      - name: 📦 Install local plugin runtime deps
        working-directory: quartz-build
        run: |
          PREACT_VERSION=$(node -p "require('./package.json').dependencies.preact")
          cd local-plugin
          npm install --no-save "preact@${PREACT_VERSION}"
        shell: bash -Eeuo pipefail {0}

      # Gate A (pre-install): assert exact config<->lock coverage BEFORE any
      # network install runs. The prebuild hook does not read the lockfile
      # at all, so this is the only place that can prove the lock closure
      # is correct before plugin code is fetched.
      - name: 🔒 Verify lockfile coverage (pre-install)
        working-directory: quartz-build
        run: node "$GITHUB_WORKSPACE/scripts/wiki-lockfile-gates.ts" coverage
        shell: bash -Eeuo pipefail {0}

      # Install strictly from the lockfile — never --from-config/--latest,
      # which would resolve enabled-but-unlocked or drifted plugin refs
      # from branch tip at build time.
      - name: 📥 Install plugins from lockfile
        working-directory: quartz-build
        run: node ./quartz/bootstrap-cli.mjs plugin install
        shell: bash -Eeuo pipefail {0}

      # Gate B (post-install): the installer can log a failure yet still
      # exit success, and parsing the lockfile after install proves
      # nothing (lock installs don't rewrite it). The only proof is
      # comparing each plugin's actual checked-out .git/HEAD against the
      # lockfile commit — a `ref:` line (branch checkout) is drift, not a
      # pinned commit, and fails just as hard as a mismatched SHA.
      - name: 🔒 Verify lockfile integrity (post-install)
        working-directory: quartz-build
        run: node "$GITHUB_WORKSPACE/scripts/wiki-lockfile-gates.ts" integrity
        shell: bash -Eeuo pipefail {0}

      # Build with the local pinned binary (`node ./quartz/bootstrap-cli.mjs`),
      # never a bare `npx quartz` that could resolve/download an unpinned
      # package at build time.
      - name: 🏗 Build site
        working-directory: quartz-build
        run: node ./quartz/bootstrap-cli.mjs build -d "$GITHUB_WORKSPACE/knowledge" -o "$GITHUB_WORKSPACE/public"
        shell: bash -Eeuo pipefail {0}

      - name: 📋 Write build summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Publish Wiki Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Quartz SHA | 9cf87ff1c248a8ca551093214b0fec3b31415009 |"
            echo "| Pages built | $(find public -name '*.html' | wc -l | tr -d ' ') |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: public

  # ---------------------------------------------------------------------------
  # Deploy job: only job with pages/id-token write. No checkout, no shell, no
  # build — it only publishes the artifact produced by `build`. Gated on
  # build succeeding (no continue-on-error / always() / failure() escape hatch).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
