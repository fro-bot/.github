configuration:
  pageTitle: "Fro Bot Knowledge Wiki"
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: en-US
  baseUrl: fro.bot/.github
  ignorePatterns:
    - "log.md"
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Inter
      body: Inter
      code: JetBrains Mono
    colors:
      lightMode:
        light: "#ffffff"
        lightgray: "#edd8d8"
        gray: "#5c4569"
        darkgray: "#5c4569"
        dark: "#1a0b2e"
        secondary: "#006064"
        tertiary: "#00838f"
        highlight: "rgba(0, 96, 100, 0.15)"
        textHighlight: "#e6510088"
      darkMode:
        light: "#0d0216"
        lightgray: "#3d2a5f"
        gray: "#8b7d9c"
        darkgray: "#f5ebeb"
        dark: "#ffffff"
        secondary: "#00bcd4"
        tertiary: "#00e5ff"
        highlight: "rgba(0, 188, 212, 0.15)"
        textHighlight: "#ffc10788"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      display: desktop-only
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
  - source: github:quartz-community/hard-line-breaks
    enabled: false
  - source: github:quartz-community/ox-hugo
    enabled: false
  - source: github:quartz-community/roam
    enabled: false
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: false
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
  - source: github:quartz-community/comments
    enabled: false
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: "https://github.com/fro-bot/.github"
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: false
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: false
  - source: github:quartz-community/encrypted-pages
    enabled: false
  - source: github:quartz-community/stacked-pages
    enabled: false
  - source:
      repo: ./local-plugin
      name: Sources
    enabled: true
    layout:
      position: afterBody
      priority: 100
  - source:
      repo: ./local-plugin
      name: GitHubSource
    enabled: true
    layout:
      position: afterBody
      priority: 110
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
